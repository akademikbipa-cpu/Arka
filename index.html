<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARKA — Redirecting...</title>
  <meta http-equiv="refresh" content="0; url=login.html" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1F3864 0%, #2E75B6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .wrap {
      text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 12px; }
    .title {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .sub {
      font-size: 0.9rem;
      opacity: 0.75;
      margin-bottom: 20px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .redirect-text {
      font-size: 0.8rem;
      opacity: 0.6;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">🎓</div>
    <div class="title">ARKA</div>
    <div class="sub">Sistem Informasi PMB — STMIK Bina Patria</div>
    <div class="spinner"></div>
    <div class="redirect-text">Mengalihkan ke halaman login...</div>
  </div>
  <script>
    // Cek apakah sudah login
    const token = localStorage.getItem("arka_token");
    const user  = localStorage.getItem("arka_user");
    if (token && user) {
      window.location.href = "dashboard.html";
    } else {
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
